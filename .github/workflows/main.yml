name: "Terraform Job"

on: workflow_dispatch

jobs:
  terraform-job:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Azure Login
        uses: Azure/login@v3
        with:
          client-id: be774c35-13bd-4c7b-a1a5-f06b9a3a9d3b
          tenant-id: 65bc8c39-1242-4747-b237-239c15b77fed
          subscription-id: db32f9ec-acc7-4507-90c8-6c0798ff4278
          client-secret: 038a2316-f2f4-4900-b7aa-2bb83e08e7a1
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=brijendra-rg" \
            -backend-config="storage_account_name=brijendrastorage" \
            -backend-config="container_name=brijendracontainer" \
            -backend-config="key=terraform.tfstate"

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve
